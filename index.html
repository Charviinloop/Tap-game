<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TikTok Tap Game</title>
//its an easy tap game

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(180deg, #000, #111);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    .game {
      width: 100%;
      max-width: 420px;
      height: 100%;
      text-align: center;
      position: relative;
    }

    h1 {
      margin-top: 20px;
    }

    .score {
      font-size: 24px;
      margin: 10px 0;
    }

    .circle {
      width: 120px;
      height: 120px;
      background: #ff0050;
      border-radius: 50%;
      position: absolute;
      bottom: 30%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 18px;
      cursor: pointer;
      user-select: none;
    }

    .timer {
      position: absolute;
      top: 10px;
      right: 20px;
      font-size: 18px;
    }

    .game-over {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    button {
      padding: 12px 20px;
      border: none;
      background: #ff0050;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="game">
  <h1>🔥 Tap Game</h1>
  <div class="score">Score: <span id="score">0</span></div>
  <div class="timer">⏱ <span id="time">10</span></div>

  <div class="circle" id="tapBtn">TAP!</div>

  <div class="game-over" id="gameOver">
    <h2>Game Over</h2>
    <p>Your score: <span id="finalScore"></span></p>
    <button onclick="restart()">Play Again</button>
  </div>
</div>

<script>
  let score = 0;
  let time = 10;
  let interval;

  const scoreEl = document.getElementById("score");
  const timeEl = document.getElementById("time");
  const tapBtn = document.getElementById("tapBtn");
  const gameOver = document.getElementById("gameOver");
  const finalScore = document.getElementById("finalScore");

  tapBtn.addEventListener("click", () => {
    if (time <= 0) return;
    score++;
    scoreEl.textContent = score;

    // small bounce
    tapBtn.style.transform = "translateX(-50%) scale(1.1)";
    setTimeout(() => {
      tapBtn.style.transform = "translateX(-50%) scale(1)";
    }, 100);
  });

  function startGame() {
    interval = setInterval(() => {
      time--;
      timeEl.textContent = time;

      if (time <= 0) {
        clearInterval(interval);
        endGame();
      }
    }, 1000);
  }

  function endGame() {
    finalScore.textContent = score;
    gameOver.style.display = "flex";
  }

  function restart() {
    score = 0;
    time = 10;
    scoreEl.textContent = score;
    timeEl.textContent = time;
    gameOver.style.display = "none";
    startGame();
  }

  startGame();
</script>

</body>
</html>
